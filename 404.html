<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lotm_wiki/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOTM Wiki</title>
    <script type="module">
      // GitHub Pages SPA redirect
      // Get the current path and redirect to index.html while preserving the URL
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Replace the 404 URL with the app's base URL + the original path
      var newPath = '/lotm_wiki' + path.replace('/lotm_wiki/404.html', '') + search + hash;
      window.location.replace(newPath);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/lotm_wiki/src/main.jsx"></script>
  </body>
</html>
