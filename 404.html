<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lotm_wiki/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOTM Wiki</title>
    <script type="module">
      // GitHub Pages SPA redirect
      // Store the original path that caused the 404
      const currentPath = window.location.pathname + window.location.search + window.location.hash;
      
      // Always ensure we have the base path
      let redirectPath = currentPath;
      if (!redirectPath.startsWith('/lotm_wiki')) {
        redirectPath = '/lotm_wiki' + redirectPath;
      }
      
      sessionStorage.setItem('redirect', redirectPath);
      
      // Redirect to the main app
      window.location.replace('/lotm_wiki/');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/lotm_wiki/src/main.jsx"></script>
  </body>
</html>
