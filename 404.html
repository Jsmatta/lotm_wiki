<!DOCTYPE html>
<script>
  // Single Page Application fallback for GitHub Pages
  // This script handles client-side routing by redirecting to the index.html
  // while preserving the original path and query parameters
  
  // Store the original path that triggered the 404
  var originalPath = window.location.pathname + window.location.search + window.location.hash;
  sessionStorage.setItem('spa-redirect', originalPath);
  
  // Redirect to the main application
  window.location.replace('/lotm_wiki/');
</script>
